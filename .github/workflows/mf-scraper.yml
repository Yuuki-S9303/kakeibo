name: MoneyForward ME → Google Sheets

on:
  # 週1回（日曜 10:00 JST = 01:00 UTC）
  schedule:
    - cron: '0 1 * * 0'
  # 月末集中期間（25〜31日 毎日 10:00 JST）
    - cron: '0 1 25-31 * *'
  # 手動実行（テスト・緊急時）
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mf-scraper/package.json

      - name: Install dependencies
        working-directory: mf-scraper
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        working-directory: mf-scraper
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        working-directory: mf-scraper
        env:
          MF_AUTH_STATE:              ${{ secrets.MF_AUTH_STATE }}
          SPREADSHEET_ID:             ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node src/scraper.js

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: mf-scraper/logs/
          if-no-files-found: ignore
          retention-days: 7
